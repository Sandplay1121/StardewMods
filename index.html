<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>星露谷 Mod 档案库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  
  <style>
    :root {
      /* 定义你的核心色彩：复古紫与古铜金 */
      --theme-color: #9d71e2; 
      --base-background: #1a1a1a; /* 深邃黑背景 */
      --sidebar-background: #151515; /* 侧边栏稍深 */
    }

    /* 全局字体自定义 */
    body {
      font-family: 'Lora', 'Georgia', serif;
      background-color: var(--base-background);
      font-size: 16px;
    }

    /* 侧边栏样式：更有“档案感” */
    .sidebar {
      border-right: 1px solid #333;
      color: #bbb;
    }

    /* 标题样式：增加一点哥特气质 */
    h1, h2, h3 {
      font-weight: 700;
      color: #d4af37 !important; /* 古铜金色标题 */
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* 修改搜索框样式 */
    .search input {
      background: #222 !important;
      border: 1px solid #444 !important;
      color: #eee !important;
      border-radius: 4px;
    }

    /* 链接样式 */
    section.content a {
      color: #9d71e2;
      text-decoration: underline;
    }

    /* 这里的代码是给 NSFW 内容准备的模糊效果 */
    .nsfw-content {
      filter: blur(15px);
      transition: filter 0.5s;
      cursor: help;
    }
    .nsfw-content:active, .nsfw-content:hover {
      filter: blur(0);
    }
  </style>
</head>
<body>
  <div id="app">正在翻阅古籍...</div>
  <script>
    window.$docsify = {
      name: '🌙 Mod 整理案',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      coverpage: false, // 如果你想做个大封面，可以改成 true
      search: {
        placeholder: '寻找遗失的 Mod...',
        noData: '未找到相关记载',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
