<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>星露谷 Mod 档案库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./fonts/MyFont.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --theme-color: #b8d0a0; 
      --base-background: transparent; 
      --sidebar-width: 240px; 
    }

    body {
      font-family: 'MyCustomFont', serif !important;
      background-image: url('1000154095.jpg'); 
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      background-color: #1a1a1a;
      color: #e0eadd;
      text-shadow: 0 0 5px rgba(125, 163, 122, 0.4);
      margin: 0;
      overflow-x: hidden;
    }

    /* 1. 侧边栏：磨砂玻璃 */
    .sidebar {
      width: var(--sidebar-width);
      background-color: rgba(15, 20, 15, 0.5) !important;
      backdrop-filter: blur(15px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease;
    }

    .app-name {
      color: #d4af37 !important;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }

    /* 2. 强制显示开关按钮 */
    .sidebar-toggle {
      background: rgba(20, 30, 20, 0.8) !important; /* 加深底色确保看见 */
      backdrop-filter: blur(5px);
      width: 50px !important;
      height: 50px !important;
      left: 10px !important;
      bottom: 10px !important;
      border-radius: 50% !important; /* 圆形按钮更像移动端操作 */
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      padding: 0 !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    
    .sidebar-toggle span {
      background-color: #b8d0a0 !important; /* 杠杠的颜色 */
      width: 20px !important;
    }

    /* 3. 内容区：自适应居中逻辑 */
    section.content {
      position: relative;
      background: rgba(20, 25, 20, 0.75); 
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      
      /* 核心：自动外边距 */
      margin: 40px auto !important; 
      width: 85% !important; 
      max-width: 900px;
      
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 修正 Docsify 默认的布局偏移 */
    .content {
      left: 0 !important;
      right: 0 !important;
      margin-left: auto !important;
      margin-right: auto !important;
    }

    /* 当侧边栏打开时，给内容区留出左侧空间，但保持它在剩余空间的中心 */
    body:not(.close) section.content {
      transform: translateX(calc(var(--sidebar-width) / 2));
    }

    h1, h2, h3 {
      font-family: 'MyCustomFont', serif !important;
      color: #b8d0a0 !important;
    }

    /* 搜索框美化 */
    .search input {
      background: rgba(255, 255, 255, 0.08) !important;
      border: 1px solid #5a7a58 !important;
      color: #fff !important;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div id="app">正在森林中寻觅档案...</div>
  <script>
    window.$docsify = {
      name: '档案室',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: '寻找遗忘的记录...',
        noData: '林深处无此记载',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
