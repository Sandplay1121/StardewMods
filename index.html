<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>星露谷 Mod 档案库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./fonts/MyFont.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --theme-color: #b8d0a0; 
      --base-background: transparent; 
      --sidebar-width: 220px; 
    }

    body {
      font-family: 'MyCustomFont', serif !important;
      background-image: url('1000154095.jpg'); 
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      background-color: #1a1a1a;
      color: #e0eadd;
      text-shadow: 0 0 5px rgba(125, 163, 122, 0.4);
      margin: 0;
    }

    /* 1. 侧边栏样式 */
    .sidebar {
      width: var(--sidebar-width);
      background-color: rgba(15, 20, 15, 0.4) !important;
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .app-name {
      color: #d4af37 !important;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }

    /* 2. 修复开关按钮 */
    .sidebar-toggle {
      background: rgba(15, 20, 15, 0.6) !important;
      backdrop-filter: blur(5px);
      width: 44px;
      padding: 10px 0;
      left: 0;
      bottom: 0;
      position: fixed;
      z-index: 20;
    }

    /* 3. 【核心修正】内容区域自动适配 */
    section.content {
      position: relative;
      background: rgba(20, 25, 20, 0.7); 
      padding: 30px;
      border-radius: 12px;
      /* 这里的计算让它在侧边栏打开时自动避开 */
      margin: 20px 40px 20px calc(var(--sidebar-width) + 40px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.3s ease; /* 增加平滑过渡动画 */
      max-width: 1000px; /* 限制最大宽度，防止横屏下撑得太开 */
    }

    /* 当侧边栏关闭时，内容区左右间距恢复对称 */
    body.close section.content {
      margin: 20px auto; /* 居中 */
      max-width: 900px;
    }

    h1, h2, h3 {
      font-family: 'MyCustomFont', serif !important;
      color: #b8d0a0 !important;
      text-shadow: 0 0 8px rgba(184, 208, 160, 0.7), 2px 2px 4px rgba(0, 0, 0, 0.8) !important;
    }

    .search input {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid #4a6348 !important;
      color: #fff !important;
      border-radius: 20px;
    }

    /* 隐藏 Docsify 默认的折叠按钮背景，防止重复 */
    body.close .sidebar-toggle {
      width: 44px;
    }
  </style>
</head>
<body>
  <div id="app">正在森林中寻觅档案...</div>
  <script>
    window.$docsify = {
      name: '档案室',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: '搜索档案...',
        noData: '林深处查无此项',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
