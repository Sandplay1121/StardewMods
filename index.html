<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>星露谷 Mod 档案库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./fonts/MyFont.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --theme-color: #b8d0a0; 
      --base-background: transparent; 
      --sidebar-width: 240px; 
    }

    body {
      font-family: 'MyCustomFont', serif !important;
      background-image: url('1000154096.jpg'); /* 使用了飞鸟这张，你也可以换回 1000154095.jpg */
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      background-color: #1a1a1a;
      color: #e0eadd;
      text-shadow: 0 0 5px rgba(125, 163, 122, 0.4);
      margin: 0;
      overflow-x: hidden;
    }

    /* 1. 侧边栏：磨砂玻璃 */
    .sidebar {
      width: var(--sidebar-width);
      background-color: rgba(15, 20, 15, 0.5) !important;
      backdrop-filter: blur(15px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .app-name {
      color: #d4af37 !important;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }

    /* 2. 左下角悬浮开关按钮 */
    .sidebar-toggle {
      background: rgba(20, 30, 20, 0.8) !important;
      backdrop-filter: blur(5px);
      width: 50px !important;
      height: 50px !important;
      left: 20px !important;
      bottom: 20px !important;
      border-radius: 50% !important; 
      display: flex !important;
      align-items: center;
      justify-content: center;
      z-index: 999;
      border: 1px solid rgba(184, 208, 160, 0.3);
    }
    
    .sidebar-toggle span {
      background-color: #b8d0a0 !important;
      width: 22px !important;
      height: 2px !important;
      margin: 4px 0 !important;
    }

    /* 3. 内容区：自适应居中逻辑 */
    section.content {
      position: relative;
      background: rgba(20, 25, 20, 0.75); 
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      
      /* 强制居中 */
      margin-left: auto !important;
      margin-right: auto !important;
      margin-top: 5vh !important;
      width: 85% !important; 
      max-width: 900px;
      
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    /* 侧边栏打开时，整体向右偏移一点，保持视觉平衡 */
    body:not(.close) section.content {
      transform: translateX(calc(var(--sidebar-width) / 2.5));
    }

    /* 4. 搜索框美化 + 抹除叉号 */
    .search input {
      background: rgba(255, 255, 255, 0.08) !important;
      border: 1px solid #5a7a58 !important;
      color: #fff !important;
      border-radius: 10px;
      padding-right: 10px !important;
    }

    /* 抹除叉号核心代码 */
    .search input::-webkit-search-cancel-button {
      display: none !important;
      -webkit-appearance: none;
    }

    h1, h2, h3 {
      font-family: 'MyCustomFont', serif !important;
      color: #b8d0a0 !important;
    }
  </style>
</head>
<body>
  <div id="app">森林档案录入中...</div>
  <script>
    window.$docsify = {
      name: '档案室',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: '寻找遗忘的记录...',
        noData: '林深处无此记载',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
