<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <meta charset="UTF-8">
  <title>星露谷 Mod 档案库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./fonts/MyFont.ttf') format('truetype');
    }

    /* --- 1. 变量系统：光影灵魂 --- */
    :root {
      --theme-color: #b8d0a0; 
      --accent-glow: rgba(184, 208, 160, 0.5); /* 强化发光感 */
      --main-bg: rgba(20, 25, 20, 0.75);
    }

    /* 学院模式：彻底去绿，换成透亮的暗金 */
    body.academia-mode {
      --theme-color: #d4be96 !important; 
      --accent-glow: rgba(212, 190, 150, 0.4) !important;
      --main-bg: rgba(35, 25, 20, 0.4) !important; /* 降低透明度，更透亮 */
    }

    /* --- 2. 基础布局 --- */
    body {
      font-family: 'MyCustomFont', serif !important;
      background-image: url('1000154104.jpg'); 
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      transition: background-image 0.8s ease;
      margin: 0;
    }

    /* 全员发光逻辑：不仅仅是标题，让所有文字都带上淡淡的阴影和光晕 */
    .app-name, 
    .sidebar ul li a, 
    section.content, 
    section.content p, 
    section.content li,
    section.content h1, 
    section.content h2, 
    section.content h3,
    .glass-btn i {
      color: var(--theme-color) !important;
      /* 这里的复合阴影提供了你想要的“一点点阴影+发光”效果 */
      text-shadow: 0 2px 4px rgba(0,0,0,0.5), 0 0 10px var(--accent-glow) !important;
      transition: all 0.5s ease;
    }

    /* --- 3. 解决三横线变红 & 颜色跟随 --- */
    .sidebar-toggle {
      background: transparent !important;
      border: none !important;
      width: 40px !important;
      bottom: 15px !important;
      left: 15px !important;
    }

    /* 强制抹除 Docsify 默认的红色或灰色，改为跟随主题色 */
    .sidebar-toggle span {
      background-color: var(--theme-color) !important;
      box-shadow: 0 0 8px var(--accent-glow) !important;
      height: 2px !important;
      width: 22px !important;
      margin: 4px 0 !important;
      display: block !important;
    }

    /* --- 4. 正文容器：通透黑幕 --- */
    section.content {
      background: var(--main-bg) !important;
      backdrop-filter: blur(5px); /* 增加模糊度提升高级感 */
      padding: 40px !important;
      border-radius: 15px;
      margin: 6vh auto !important;
      width: 85% !important;
      max-width: 900px !important;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: none !important; /* 确保标题下的横条消失 */
    }

    /* 侧边栏通透感 */
    .sidebar {
      background: rgba(15, 20, 15, 0.4) !important;
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* 彻底关掉标题下的实色线条 */
    section.content h1, section.content h2, section.content h3 {
      border-bottom: none !important;
    }

    /* --- 5. 按钮精修 --- */
    .glass-btn {
      width: 40px; height: 40px;
      left: 15px; position: fixed;
      background: rgba(25, 35, 25, 0.8);
      border: 1px solid var(--accent-glow);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 1001;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }
    .glass-btn:nth-child(1) { bottom: 65px; }
    .glass-btn:nth-child(2) { bottom: 115px; }

    /* --- 补丁 A：侧边栏宽度瘦身 --- */
:root {
  --sidebar-width: 210px !important; /* 强制缩小宽度，建议 200px 左右比较精致 */
}

.sidebar {
  width: var(--sidebar-width) !important;
}

/* 适配移动端或展开状态，确保内容区不被遮挡 */
section.content {
  padding-left: 20px !important;
  padding-right: 20px !important;
}

/* --- 补丁 B：搜索框圆润化 --- */
.search {
  padding: 10px 15px !important; /* 稍微调整搜索框间距 */
}

.search input {
  border-radius: 20px !important;      /* 👈 胶囊型圆角 */
  background: rgba(255, 255, 255, 0.1) !important; /* 半透明背景 */
  border: 1px solid var(--accent-glow) !important; /* 描边颜色跟随主题发光色 */
  color: var(--theme-color) !important;
  padding: 8px 15px !important;
  transition: all 0.3s ease;
}

.search input:focus {
  box-shadow: 0 0 10px var(--accent-glow) !important; /* 聚焦时发光 */
  background: rgba(255, 255, 255, 0.15) !important;
}

/* 搜索框清除按钮（那个小叉号） */
.search .clear-button {
  color: var(--theme-color) !important;
  opacity: 0.6;
}




  </style>
</head>
<body>
  <div id="app">正在加载...</div>

  <div class="custom-btns">
    <div class="glass-btn" onclick="toggleBG()">🌿</div>
    <div class="glass-btn" onclick="toggleGothic()">🌑</div>
  </div>

  <script>
    window.$docsify = {
      name: '档案室',
      loadSidebar: true,
      subMaxLevel: 2,
      search: { placeholder: '寻找遗忘的记录...', noData: '无此记载' }
    }

      // 背景仓库：默认绿色库 & 学院棕色库
  const collections = {
    default: {
      bgs: ['1000154095.jpg', '1000154096.jpg'], // 初始绿色的两张背景
      icon: 'fa-leaf' 
    },
    academia: {
      bgs: ['1000154119.jpg', '1000154120.jpg'], // 你选出的古典两张背景
      icon: 'fa-book'
    }
  };

  let isAcademia = false; 
  let bgIndex = 0;        

  // 初始化：让按钮显示矢量图标而不是 Emoji
  window.addEventListener('DOMContentLoaded', () => {
    updateUI();
  });

  // 按钮 1：背景切换 (🌿 / 📘)
  function toggleBG() {
    bgIndex = (bgIndex === 0) ? 1 : 0;
    const mode = isAcademia ? 'academia' : 'default';
    document.body.style.backgroundImage = `url('${collections[mode].bgs[bgIndex]}')`;
  }

  // 按钮 2：主题模式切换 (📖)
  function toggleGothic() {
    isAcademia = !isAcademia;
    bgIndex = 0; // 切换主题时，默认回到该主题的第一张背景
    document.body.classList.toggle('academia-mode');
    
    const mode = isAcademia ? 'academia' : 'default';
    document.body.style.backgroundImage = `url('${collections[mode].bgs[bgIndex]}')`;
    
    updateUI(); // 切换图标和发光颜色
  }

  // 更新 UI 细节
  function updateUI() {
    const mode = isAcademia ? 'academia' : 'default';
    const bgBtn = document.querySelector('.glass-btn:nth-child(1)'); 
    const themeBtn = document.querySelector('.glass-btn:nth-child(2)'); 

    // 设置图标：背景切换图标根据模式变，主题切换图标固定为书本
    if (bgBtn) bgBtn.innerHTML = `<i class="fas ${collections[mode].icon}"></i>`;
    if (themeBtn) themeBtn.innerHTML = `<i class="fas fa-book-open"></i>`;
  }
    
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
