<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <meta charset="UTF-8">
  <title>星露谷 Mod 档案库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./fonts/MyFont.ttf') format('truetype');
    }

    /* --- 1. 变量系统：光影灵魂 --- */
    :root {
      --theme-color: #b8d0a0; 
      --accent-glow: rgba(184, 208, 160, 0.6); /* 强化发光感 */
      --main-bg: rgba(20, 25, 20, 0.75);
    }

    /* 学院模式：去绿，暖棕色调 + 更实的黑幕 */
    body.academia-mode {
      --theme-color: #d4be96 !important; 
      --accent-glow: rgba(212, 190, 150, 0.5) !important;
      --main-bg: rgba(25, 20, 15, 0.25) !important; /* 黑幕更实，来自 index10 */
    }

    /* --- 2. 基础布局 --- */
    body {
      font-family: 'MyCustomFont', serif !important;
      background-image: url('1000154104.jpg'); 
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      transition: background-image 0.8s ease;
      margin: 0;
    }

    /* 
      全员发光逻辑（替换为 index10 的强化版） 
      更深的黑色阴影 + 更强的主题色光晕
    */
    .app-name, 
    .sidebar ul li a, 
    section.content, 
    section.content p, 
    section.content li,
    section.content h1, 
    section.content h2, 
    section.content h3,
    .glass-btn i {
      color: var(--theme-color) !important;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 12px var(--accent-glow) !important;
      transition: all 0.5s ease;
    }

    /* --- 3. 侧边栏三横线：去红、跟随主题变色发光 --- */
    .sidebar-toggle {
      background: transparent !important;
      border: none !important;
      width: 44px !important;
      height: 44px !important;
      bottom: 15px !important;
      left: 15px !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
    }

    /* 核心修复：背景色用主题色，并加上光晕 */
    .sidebar-toggle span {
      background-color: var(--theme-color) !important;
      height: 2px !important;
      width: 22px !important;
      margin: 3px 0 !important;
      display: block !important;
      box-shadow: 0 0 8px var(--accent-glow) !important; 
    }

    /* --- 4. 正文容器：黑幕透明底（吸收 index10 的 blur 值）--- */
    section.content {
      background: var(--main-bg) !important;
      backdrop-filter: blur(12px);   /* 调整模糊度 */
      padding: 40px !important;
      border-radius: 15px;
      margin: 6vh auto !important;
      width: 85% !important;
      max-width: 900px !important;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-bottom: none !important;
    }

    /* 侧边栏通透感 */
    .sidebar {
      background: rgba(15, 20, 15, 0.4) !important;
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* 彻底关掉标题下的实色线条 */
    section.content h1, section.content h2, section.content h3 {
      border-bottom: none !important;
    }

    /* --- 5. 按钮精修 --- */
    .glass-btn {
      width: 40px; height: 40px;
      left: 15px; position: fixed;
      background: rgba(25, 35, 25, 0.85);
      border: 1px solid var(--accent-glow);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 1001;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
    }

    /* 学院模式下按钮背景微调（来自 index10） */
    body.academia-mode .glass-btn {
      background: rgba(35, 25, 20, 0.7) !important;
    }

    .glass-btn:nth-child(1) { bottom: 65px; }
    .glass-btn:nth-child(2) { bottom: 115px; }

  </style>
</head>
<body>
  <div id="app">正在加载...</div>

  <div class="custom-btns">
    <div class="glass-btn" onclick="toggleBG()">🌿</div>
    <div class="glass-btn" onclick="toggleGothic()">🌑</div>
  </div>

  <script>
    window.$docsify = {
      name: '档案室',
      loadSidebar: true,
      subMaxLevel: 2,
      search: { placeholder: '寻找遗忘的记录...', noData: '无此记载' }
    }

    // 背景仓库：默认绿色库 & 学院棕色库
    const collections = {
      default: {
        bgs: ['1000154095.jpg', '1000154096.jpg'], // 初始绿色的两张背景
        icon: 'fa-leaf' 
      },
      academia: {
        bgs: ['1000154119.jpg', '1000154120.jpg'], // 古典两张背景
        icon: 'fa-book'
      }
    };

    let isAcademia = false; 
    let bgIndex = 0;        

    // 初始化：让按钮显示矢量图标而不是 Emoji
    window.addEventListener('DOMContentLoaded', () => {
      updateUI();
    });

    // 按钮 1：背景切换 (🌿 / 📘)
    function toggleBG() {
      bgIndex = (bgIndex === 0) ? 1 : 0;
      const mode = isAcademia ? 'academia' : 'default';
      document.body.style.backgroundImage = `url('${collections[mode].bgs[bgIndex]}')`;
    }

    // 按钮 2：主题模式切换 (📖)
    function toggleGothic() {
      isAcademia = !isAcademia;
      bgIndex = 0; // 切换主题时，默认
