<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <title>星露谷 Mod 档案库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css">
  
  <style>
    @font-face {
      font-family: 'MyCustomFont';
      src: url('./fonts/MyFont.ttf') format('truetype');
    }

    :root {
      --theme-color: #b8d0a0; 
      --sidebar-width: 240px;
      --bg-image: url('1000154095.jpg'); /* 默认幽深绿意 */
    }

    /* 哥特模式的变量预留 */
    .gothic-mode {
      --theme-color: #9d71e2;
      --bg-image: url('你的哥特图.jpg'); 
      filter: sepia(0.2) contrast(1.1);
    }

    body {
      font-family: 'MyCustomFont', serif !important;
      background-image: var(--bg-image);
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      transition: background-image 0.5s ease;
    }

    /* 1. 强制黑幕居中逻辑 */
    section.content {
      background: rgba(20, 25, 20, 0.75) !important;
      padding: 40px !important;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      
      /* 核心：不再随 Docsify 自动偏移 */
      margin: 60px auto !important; 
      width: 80% !important;
      max-width: 900px !important;
      position: relative !important;
      left: 0 !important;
    }

    /* 侧边栏打开时，整体稍微右移以留出空隙，但不破坏黑幕本身形状 */
    body:not(.close) .content {
      transform: translateX(120px); 
    }

    /* 2. 预览图自动滤镜 */
    section.content img {
      filter: grayscale(40%) brightness(90%) sepia(20%); /* 低饱和浅色滤镜 */
      transition: filter 0.4s ease, transform 0.4s ease;
      border-radius: 8px;
    }
    section.content img:hover {
      filter: grayscale(0%) brightness(100%) sepia(0%); /* 悬停恢复 */
      transform: scale(1.02);
    }

    /* 3. 功能按钮组 (左下角) */
    .custom-controls {
      position: fixed;
      left: 20px;
      bottom: 80px; /* 在开关按钮上方 */
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ctrl-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(20, 30, 20, 0.8);
      border: 1px solid var(--theme-color);
      color: var(--theme-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      backdrop-filter: blur(5px);
    }

    /* 4. 抹除搜索框叉号 */
    .search input::-webkit-search-cancel-button { display: none !important; }

    /* 5. 侧边栏及其他样式 */
    .sidebar { background: rgba(15, 20, 15, 0.5) !important; backdrop-filter: blur(15px); }
    .sidebar-toggle { bottom: 20px !important; left: 20px !important; }
  </style>
</head>
<body class="forest-theme">
  <div id="app">正在编织森林幻想...</div>

  <div class="custom-controls">
    <button class="ctrl-btn" onclick="toggleBG()" title="切换背景">🖼️</button>
    <button class="ctrl-btn" onclick="toggleGothic()" title="哥特模式">🌑</button>
  </div>

  <script>
    window.$docsify = {
      name: '档案室',
      loadSidebar: true,
      subMaxLevel: 2,
    }

    // 切换背景逻辑
    let currentBG = 1;
    function toggleBG() {
      const body = document.body;
      if (currentBG === 1) {
        body.style.setProperty('--bg-image', "url('1000154096.jpg')");
        currentBG = 2;
      } else {
        body.style.setProperty('--bg-image', "url('1000154095.jpg')");
        currentBG = 1;
      }
    }

    // 哥特模式逻辑（预留）
    function toggleGothic() {
      document.body.classList.toggle('gothic-mode');
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
